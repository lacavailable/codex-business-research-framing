name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned official Skill validator
        uses: actions/checkout@v4
        with:
          repository: openai/skills
          ref: 49f948faa9258a0c61caceaf225e179651397431
          path: .official-skills
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run deterministic tests
        run: pytest
      - name: Check generated documents and literature records
        run: |
          python tools/generate_rubric.py --check
          python tools/generate_rule_matrix.py --check
          python tools/generate_public_calibration.py --check
          python tools/generate_bias_diagnostics.py --check
          python tools/evaluator_calibration.py validate-suite evals/calibration
          python tools/verify_calibration_freeze.py
          python tools/validate_literature.py --require-complete
          python tools/evaluate_benchmark.py validate
          python tools/evaluate_benchmark.py validate-artifacts
      - name: Check public calibration copyright and authorization attestations
        run: |
          python tools/audit_calibration_copyright.py
          python - <<'PY'
          import json
          from pathlib import Path

          tier_a = json.loads(Path("evals/automated-triangulation/results/tier-a-attestation.json").read_text(encoding="utf-8"))
          assert tier_a["authorization_tier"] == "tier_a"
          assert tier_a["no_human_experts"] is True
          assert tier_a["expert_holdout_unopened"] is True
          assert isinstance(tier_a["limitations"], list) and tier_a["limitations"]
          if tier_a["experimental_release_eligible"]:
              assert tier_a["status"] == "passed"
              assert tier_a["development_passed"] is True
              assert tier_a["validation_passed"] is True
              assert tier_a["evaluator_frozen"] is True
              assert tier_a["automated_holdout_opened"] is True
              assert tier_a["production_benchmark_complete"] is True
              assert tier_a["freeze_commit"]

          tier_b = json.loads(Path("evals/calibration/public-metadata/private-calibration-attestation.json").read_text(encoding="utf-8"))
          assert isinstance(tier_b["holdout_opened"], bool)
          assert isinstance(tier_b["production_benchmark_run"], bool)
          assert isinstance(tier_b["release_eligible"], bool)
          if tier_b["release_eligible"]:
              assert tier_b["qualified_reviewers"] > 0
              assert tier_b["expert_annotations"] > 0
              assert tier_b["holdout_opened"] is True
              assert tier_b["production_benchmark_run"] is True
              assert tier_b["evaluator_freeze_commit"]
          PY
      - name: Audit tracked publication content
        run: python tools/audit_repository.py --tracked
      - name: Check local Markdown links
        run: python tools/check_links.py
      - name: Run pinned official Skill validation
        run: python .official-skills/skills/.system/skill-creator/scripts/quick_validate.py skills/frame-business-research-problem
      - name: Build and verify installable Skill
        run: |
          python tools/package_skill.py --version 0.3.0-experimental.0 --output-dir dist
          python tools/package_skill.py --verify dist/frame-business-research-problem-v0.3.0-experimental.0.zip
          python -m zipfile -e dist/frame-business-research-problem-v0.3.0-experimental.0.zip .clean-install
          python .official-skills/skills/.system/skill-creator/scripts/quick_validate.py .clean-install/frame-business-research-problem
      - name: Upload package smoke-test artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: frame-business-research-problem-ci
          path: |
            dist/frame-business-research-problem-v0.3.0-experimental.0.zip
            dist/frame-business-research-problem-v0.3.0-experimental.0.zip.sha256
          if-no-files-found: error
